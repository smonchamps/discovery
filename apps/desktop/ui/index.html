<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>discovery</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>discovery</h1>
  <span id="accounts"></span>
  <span id="status">démarrage…</span>
  <button id="connect" hidden>Ajouter un compte</button>
  <div id="add-menu" hidden>
    <button id="add-gmail">Compte Gmail</button>
    <button id="add-imap">Compte IMAP/SMTP</button>
  </div>
  <button id="compose-btn" hidden title="Écrire (c)">Écrire</button>
  <button id="refresh" hidden>Synchroniser</button>
  <input id="search" type="search" placeholder="Rechercher…" hidden>
</header>
<div id="imap-dialog" hidden>
  <form id="imap-form">
    <h2>Ajouter un compte IMAP/SMTP</h2>
    <label>Adresse email <input id="imap-email" type="email" required></label>
    <label>Nom d'utilisateur (optionnel) <input id="imap-username" type="text" placeholder="identique à l'email"></label>
    <label>Mot de passe <input id="imap-password" type="password" required></label>
    <label>Serveur IMAP <input id="imap-host" type="text" placeholder="imap.exemple.fr" required></label>
    <label>Port IMAP <input id="imap-port" type="number" value="993" min="1" max="65535" required></label>
    <label>Serveur SMTP <input id="smtp-host" type="text" placeholder="smtp.exemple.fr" required></label>
    <label>Port SMTP <input id="smtp-port" type="number" value="465" min="1" max="65535" required></label>
    <div id="imap-actions">
      <button type="submit">Ajouter</button>
      <button type="button" id="imap-cancel">Annuler</button>
    </div>
  </form>
</div>
<div id="outbox-bar" hidden>
  <span id="outbox-summary"></span>
  <div id="outbox-problems"></div>
</div>
<div id="drafts-bar" hidden>
  <span id="drafts-summary"></span>
  <div id="drafts-list"></div>
</div>
<div id="backfill-bar" hidden>
  <span id="backfill-summary"></span>
  <button id="backfill-start">Rendre cherchables</button>
  <button id="backfill-stop" hidden>Arrêter</button>
</div>
<main class="split">
  <section id="pane-list">
    <div id="scroll-space"><div id="rows"></div></div>
    <div id="search-results" hidden></div>
    <p id="empty" hidden>Aucun message pour l'instant.</p>
  </section>
  <section id="pane-detail">
    <p id="detail-placeholder">Sélectionnez un message pour le lire.</p>
    <article id="detail" hidden>
      <header id="detail-header">
        <div id="detail-actions">
          <button id="star" title="Étoiler (s)">☆</button>
          <button id="reply" title="Répondre (r)">Répondre</button>
          <button id="forward" title="Transférer (f)">Transférer</button>
          <button id="archive" title="Archiver (e)">Archiver</button>
          <button id="delete" title="Supprimer (Suppr)">Supprimer</button>
        </div>
        <h2 id="detail-subject"></h2>
        <p id="detail-meta"></p>
        <p id="detail-note" hidden>
          <span id="note-text"></span>
          <button id="show-images">Afficher les images</button>
        </p>
      </header>
      <iframe id="detail-frame" sandbox title="Contenu du message"></iframe>
    </article>
    <section id="compose" hidden>
      <h2 id="compose-title">Nouveau message</h2>
      <label id="compose-from-row" hidden>De <select id="compose-from"></select></label>
      <label>À <input id="compose-to" type="text" placeholder="destinataire@exemple.fr"></label>
      <label>Objet <input id="compose-subject" type="text"></label>
      <textarea id="compose-body" placeholder="Votre message…"></textarea>
      <div id="compose-actions">
        <button id="compose-send">Envoyer</button>
        <button id="compose-cancel" title="Annuler (Échap)">Annuler</button>
      </div>
    </section>
  </section>
</main>
<footer id="perf"></footer>
<script src="app.js"></script>
</body>
</html>
