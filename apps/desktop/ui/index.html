<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>discovery</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>discovery</h1>
  <span id="account" hidden></span>
  <span id="status">démarrage…</span>
  <button id="connect" hidden>Connecter Gmail</button>
  <button id="refresh" hidden>Synchroniser</button>
</header>
<main class="split">
  <section id="pane-list">
    <ul id="list"></ul>
    <p id="empty" hidden>Aucun message pour l'instant.</p>
  </section>
  <section id="pane-detail">
    <p id="detail-placeholder">Sélectionnez un message pour le lire.</p>
    <article id="detail" hidden>
      <header id="detail-header">
        <h2 id="detail-subject"></h2>
        <p id="detail-meta"></p>
        <p id="detail-note" hidden>
          <span id="note-text"></span>
          <button id="show-images">Afficher les images</button>
        </p>
      </header>
      <iframe id="detail-frame" sandbox title="Contenu du message"></iframe>
    </article>
  </section>
</main>
<footer id="perf"></footer>
<script src="app.js"></script>
</body>
</html>
