name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: fmt + clippy + tests (Windows, cible du produit)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Lints (warnings = erreurs)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Tests
        run: cargo test --workspace

  e2e:
    name: E2E Playwright (la vraie fenêtre, Windows + WebView2)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: e2e/package-lock.json
      # L'app est une fenêtre WebView2 : sans le runtime, elle démarre,
      # reste vivante et muette, et n'ouvre jamais son port CDP (constaté
      # sur le premier passage en CI). Windows Server n'embarque pas Edge
      # comme Windows 11 : on vérifie, et on installe si besoin.
      - name: WebView2 — vérifier la présence, installer si absent
        shell: pwsh
        run: |
          $clients = @(
            'HKLM:\SOFTWARE\WOW6432Node\Microsoft\EdgeUpdate\Clients\{F3017226-FE2A-4295-8BDF-00C3A9A7E4C5}',
            'HKLM:\SOFTWARE\Microsoft\EdgeUpdate\Clients\{F3017226-FE2A-4295-8BDF-00C3A9A7E4C5}'
          )
          $version = $null
          foreach ($client in $clients) {
            if (Test-Path $client) { $version = (Get-ItemProperty $client).pv }
          }
          if ($version) {
            Write-Host "WebView2 present, version $version"
            exit 0
          }
          Write-Host 'WebView2 ABSENT — installation du runtime Evergreen'
          $setup = Join-Path $env:RUNNER_TEMP 'MicrosoftEdgeWebview2Setup.exe'
          Invoke-WebRequest -Uri 'https://go.microsoft.com/fwlink/p/?LinkId=2124703' -OutFile $setup
          & $setup /silent /install
          if ($LASTEXITCODE -ne 0) { throw "installation WebView2 echouee (code $LASTEXITCODE)" }
          foreach ($client in $clients) {
            if (Test-Path $client) { $version = (Get-ItemProperty $client).pv }
          }
          Write-Host "WebView2 installe, version $version"

      # Pré-construire ICI, hors du hook Playwright : launchApp lance
      # lui-même `cargo build`/`cargo run`, mais compiler à froid depuis
      # le beforeAll dépasserait son timeout (60 s). Une étape par
      # commande : un `run:` multi-lignes tourne en PowerShell sur Windows
      # et masquerait l'échec de la première commande.
      - name: Construire l'application
        run: cargo build -p discovery-desktop
      - name: Construire le semeur de base E2E
        run: cargo build -p mail-core --example seed_inbox
      - name: Dépendances E2E
        # Les tests s'attachent à WebView2 via CDP (connectOverCDP) : aucun
        # navigateur Playwright n'est lancé, donc rien à télécharger.
        run: npm ci
        working-directory: e2e
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
      - name: E2E (10 parcours pilotés via CDP)
        run: npm test
        working-directory: e2e

  audit:
    name: cargo audit (CVE des dépendances)
    runs-on: ubuntu-latest
    # L'action publie son rapport comme check run : sans checks:write le job
    # échoue avec « Resource not accessible by integration ».
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
