name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: fmt + clippy + tests (Windows, cible du produit)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Lints (warnings = erreurs)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Tests
        run: cargo test --workspace

  # Pas de job E2E ici : un runner GitHub hébergé n'ouvre pas de fenêtre
  # WebView2 (mesuré — voir ADR 0005). Les parcours E2E sont joués par le
  # hook `.githooks/pre-push`, sur une vraie session Windows.

  audit:
    name: cargo audit (CVE des dépendances)
    runs-on: ubuntu-latest
    # L'action publie son rapport comme check run : sans checks:write le job
    # échoue avec « Resource not accessible by integration ».
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
