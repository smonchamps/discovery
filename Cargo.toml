[workspace]
resolver = "2"
members = ["crates/mail-core", "apps/desktop"]

[workspace.package]
version = "0.1.0"
edition = "2024"

[workspace.dependencies]
mail-core = { path = "crates/mail-core" }
anyhow = "1"
thiserror = "2"

[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.lints.clippy]
unwrap_used = "warn"
expect_used = "warn"
